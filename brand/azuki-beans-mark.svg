<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96" role="img" aria-label="azuki-beans">
  <defs>
    <linearGradient id="beanFront" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#C2495A"/>
      <stop offset="1" stop-color="#8A2230"/>
    </linearGradient>
    <linearGradient id="beanBack" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8A2230"/>
      <stop offset="1" stop-color="#5E1620"/>
    </linearGradient>
  </defs>

  <!-- bean dietro -->
  <g transform="rotate(20 60 50)">
    <ellipse cx="60" cy="50" rx="18" ry="24" fill="url(#beanBack)"/>
    <rect x="57" y="32" width="6" height="36" rx="3" fill="#F5EAD7" opacity="0.85"/>
  </g>

  <!-- bean davanti -->
  <g transform="rotate(-18 40 48)">
    <ellipse cx="40" cy="48" rx="20" ry="26" fill="url(#beanFront)"/>
    <ellipse cx="32" cy="36" rx="6" ry="10" fill="#ffffff" opacity="0.18"/>
    <rect x="37" y="26" width="6" height="44" rx="3" fill="#F5EAD7"/>
  </g>
</svg>
