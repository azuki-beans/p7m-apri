<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>p7m-apri — Estrai PDF da file .p7m</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
        :root { color-scheme: light dark; }
        * { box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
            margin: 0; min-height: 100vh; display: flex;
            align-items: center; justify-content: center;
            background: #f4f5f7; color: #1a1a1a; padding: 1rem;
        }
        .card {
            background: #fff; max-width: 520px; width: 100%;
            padding: 2rem; border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0,0,0,.08);
        }
        h1 { margin: 0 0 .25rem; font-size: 1.5rem; }
        p.sub { margin: 0 0 1.5rem; color: #666; font-size: .95rem; }
        input[type=file] {
            width: 100%; padding: 2.5rem 1rem; border: 2px dashed #bbb;
            border-radius: 8px; background: #fafafa; margin-bottom: 1rem;
            cursor: pointer; text-align: center; font-size: .95rem;
        }
        input[type=file]:hover { border-color: #2563eb; background: #f0f5ff; }
        button {
            width: 100%; padding: .8rem; border: 0; border-radius: 8px;
            background: #2563eb; color: #fff; font-size: 1rem;
            cursor: pointer; font-weight: 600;
        }
        button:hover { background: #1d4ed8; }
        .indicator { display: none; margin-top: 1rem; color: #666; }
        .htmx-request .indicator { display: block; }
        .htmx-request button { opacity: .6; pointer-events: none; }
        footer { margin-top: 1.5rem; font-size: .8rem; color: #999; }
        a { color: #2563eb; }
    </style>
</head>
<body>
    <main class="card">
        <h1>📄 p7m-apri</h1>
        <p class="sub">Carica un file <code>.p7m</code> firmato digitalmente:
            estrai il documento originale e verifica la firma al volo.</p>

        <form hx-post="{% url 'verify' %}"
              hx-target="#result"
              hx-encoding="multipart/form-data"
              hx-disabled-elt="find button"
              hx-on::after-request="this.reset()">
            {% csrf_token %}
            <input type="file" name="file" accept=".p7m" required>
            <button type="submit">Estrai e verifica</button>
            <div class="indicator">Elaborazione in corso…</div>
        </form>

        <div id="result"></div>

        <footer>
            Nessun file viene conservato: i documenti estratti sono rimossi
            automaticamente dopo un'ora.
        </footer>
    </main>
</body>
</html>
